name: Scenario Iterations GitHub

on:
  schedule:
    - cron: "0 6 * * 1"
      timezone: "Europe/London"
  workflow_dispatch:

jobs:
  scenario_iterations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create BigQuery credentials file
        run: echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > key.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Run scenario_iterations_github.py
        env:
          GOOGLE_APPLICATION_CREDENTIALS: key.json
        run: python "2. Daily/scenario_iterations_github.py"
