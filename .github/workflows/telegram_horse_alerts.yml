name: Telegram Horse Alerts

on:
  schedule:
    # Morning alert (07:00 UK)
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"

    # Evening alert (22:00 UK)
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"

  workflow_dispatch:
    inputs:
      alert_type:
        description: "Which alert to send"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  telegram-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Set alert type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ALERT_TYPE=${{ github.event.inputs.alert_type }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +'%H')
      
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ]; then
              echo "ALERT_TYPE=morning" >> $GITHUB_ENV
            elif [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ]; then
              echo "ALERT_TYPE=evening" >> $GITHUB_ENV
            else
              echo "No alert scheduled for this time"
              exit 0
            fi
          fi

      - name: Send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALERT_TYPE: ${{ env.ALERT_TYPE }}
        run: python Alerts/send_telegram_alerts.py
