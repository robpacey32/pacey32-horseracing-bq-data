name: 🛠 Repair Missing Postrace URLs

on:
  workflow_dispatch:

jobs:
  repair-missing-postrace-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create key.json from secret
        run: |
          echo '${{ secrets.GCP_KEY_JSON }}' > key.json

      - name: Run repair script
        run: python "1. History/1b. RepaireMissingPostraceURLs.py"
